name: CI
on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Import check
        run: python -c "import app.main; print('app.main imports OK')"
      # If a tests/ folder exists, run pytest; otherwise skip without failing.
      - name: Tests (if present)
        run: |
          if [ -d tests ]; then pip install pytest && pytest -q; else echo "no tests/"; fi

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build

  docker:
    name: Backend Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: meetingmind-backend:ci
